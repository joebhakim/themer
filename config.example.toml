version = 2
enabled_adapters = ["kde", "kitty", "fish", "neovim", "cursor"]

[ui]
preview_on_move = true
preview_debounce_ms = 120
show_diagnostics = true

[adapters.kitty]
known_themes = [
  "Obsidian",
  "Dracula",
  "Nord",
  "Catppuccin-Mocha",
  "Catppuccin-Latte",
  "Catppuccin-Frappe",
  "Catppuccin-Macchiato",
  "Gruvbox Dark",
  "Gruvbox Light",
  "Solarized Dark",
  "Solarized Light",
  "Tokyo Night",
  "Tokyo Night Storm",
  "One Half Dark",
  "One Half Light",
  "Rose Pine",
  "Rose Pine Moon",
  "Rose Pine Dawn",
  "Alabaster",
  "GitHub Dark",
  "GitHub Light",
]

[adapters.fish]
themes_dir = "/usr/share/fish/themes"
apply_mode = "session_refresh"
refresh_path = "~/.local/state/themer/fish/theme.fish"

[adapters.neovim]
config_path = "~/.config/nvim/lua/kickstart/plugins/theme.lua"
colorscheme_pattern = "vim\\.cmd\\.colorscheme\\s+['\\\"]([^'\\\"]+)['\\\"]"
known_themes = [
  "tokyonight-night",
  "tokyonight-day",
  "tokyonight-moon",
  "tokyonight-storm",
]

[adapters.cursor]
settings_path = "~/.config/Cursor/User/settings.json"
known_themes = [
  "Default Dark+",
  "Default Dark Modern",
  "Default Light Modern",
  "Default Light+",
  "Quiet Light",
  "Default High Contrast",
]

[profiles.nord.targets]
kde = "BreezeDark"
kitty = "Nord"
fish = "nord"
neovim = "tokyonight-storm"
cursor = "Default Dark+"

[profiles.light.targets]
kde = "BreezeLight"
kitty = "Alabaster"
fish = "snow-day"
neovim = "tokyonight-day"
cursor = "Default Light Modern"
